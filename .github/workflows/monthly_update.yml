name: 每月 1 號更新社群資料

on:
  schedule:
    # 臺灣時間每月1號中午12點 (UTC時間每月1號凌晨4點)
    - cron: '0 4 1 * *'
  workflow_dispatch: # 允許手動強制更新

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝所需套件 (包含中研院 CKIP 與 PyTorch)
        run: |
          pip install requests snownlp pandas
          # 安裝輕量版 CPU PyTorch 以節省 GitHub Action 執行時間
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install transformers ckip-transformers

      - name: 執行資料抓取與運算腳本
        env:
          BYCRAWL_API_KEY: ${{ secrets.BYCRAWL_API_KEY }} 
        run: python update_data.py

      - name: 儲存更新後的資料庫(data.json)到 Repo
        run: |
          git config --global user.name "Data-Bot"
          git config --global user.email "action@github.com"
          git add data.json
          git commit -m "Auto-update: 每月社群數據爬取 (90天 & CKIP斷詞)" || echo "無資料變更"
          git push
